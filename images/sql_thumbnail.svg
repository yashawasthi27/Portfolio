<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#065f46" />
            <stop offset="50%" stop-color="#0b3f30" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>
        <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#10b981" flood-opacity="0.25" />
        </filter>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bgGrad)" />
    
    <!-- Decorative Grid Overlay -->
    <g stroke="rgba(255, 255, 255, 0.03)" stroke-width="1">
        <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450" />
        <path d="M 100,0 L 100,500 M 200,0 L 200,500 M 300,0 L 300,500 M 400,0 L 400,500 M 500,0 L 500,500 M 600,0 L 600,500 M 700,0 L 700,500" />
    </g>
    
    <!-- Title / Header -->
    <text x="40" y="55" fill="#ffffff" font-family="'Inter', sans-serif" font-size="20" font-weight="800" letter-spacing="1">POSTGRESQL ANALYTICS</text>
    <rect x="40" y="68" width="80" height="4" rx="2" fill="url(#accentGrad)" />

    <!-- Database Icon -->
    <g transform="translate(680, 30)" filter="url(#glow)">
        <ellipse cx="40" cy="18" rx="28" ry="10" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="2" />
        <path d="M12,18 V30 A28,10 0 0,0 68,30 V18" fill="none" stroke="#10b981" stroke-width="2" />
        <path d="M12,30 V42 A28,10 0 0,0 68,42 V30" fill="none" stroke="#10b981" stroke-width="2" />
        <path d="M12,42 V54 A28,10 0 0,0 68,54 V42" fill="none" stroke="#10b981" stroke-width="2" />
    </g>

    <!-- Visual Element 1: SQL Code Window -->
    <g transform="translate(40, 110)" filter="url(#shadow)">
        <!-- Window Frame -->
        <rect width="360" height="340" rx="12" fill="#0b0f19" stroke="rgba(16, 185, 129, 0.2)" stroke-width="1.5" />
        
        <!-- Title Bar -->
        <path d="M 0,12 A 12,12 0 0,1 12,0 L 348,0 A 12,12 0 0,1 360,12 L 360,35 L 0,35 Z" fill="#131926" />
        <!-- Window Dots -->
        <circle cx="20" cy="17" r="6" fill="#ef4444" />
        <circle cx="38" cy="17" r="6" fill="#f59e0b" />
        <circle cx="56" cy="17" r="6" fill="#10b981" />
        <text x="85" y="22" fill="#64748b" font-family="monospace" font-size="12">retail_performance.sql</text>

        <!-- Code Lines -->
        <g font-family="monospace" font-size="12" font-weight="600" xml:space="preserve">
            <!-- Line numbers -->
            <g fill="#334155">
                <text x="18" y="65">1</text>
                <text x="18" y="90">2</text>
                <text x="18" y="115">3</text>
                <text x="18" y="140">4</text>
                <text x="18" y="165">5</text>
                <text x="18" y="190">6</text>
                <text x="18" y="215">7</text>
                <text x="18" y="240">8</text>
                <text x="18" y="265">9</text>
                <text x="18" y="290">10</text>
                <text x="18" y="315">11</text>
            </g>
            
            <!-- Code text -->
            <g transform="translate(42, 0)">
                <text x="0" y="65" fill="#f43f5e">WITH</text>
                <text x="35" y="65" fill="#38bdf8">monthly_sales</text>
                <text x="125" y="65" fill="#f43f5e">AS</text>
                <text x="145" y="65" fill="#e2e8f0">(</text>

                <text x="16" y="90" fill="#f43f5e">SELECT</text>
                
                <text x="32" y="115" fill="#38bdf8">DATE_TRUNC</text>
                <text x="104" y="115" fill="#e2e8f0">(</text>
                <text x="110" y="115" fill="#f59e0b">'month'</text>
                <text x="160" y="115" fill="#e2e8f0">,</text>
                <text x="170" y="115" fill="#38bdf8">order_date</text>
                <text x="242" y="115" fill="#e2e8f0">)</text>
                <text x="250" y="115" fill="#f43f5e">AS</text>
                <text x="268" y="115" fill="#e2e8f0">mo,</text>

                <text x="32" y="140" fill="#38bdf8">SUM</text>
                <text x="56" y="140" fill="#e2e8f0">(</text>
                <text x="62" y="140" fill="#38bdf8">total_price</text>
                <text x="140" y="140" fill="#e2e8f0">)</text>
                <text x="150" y="140" fill="#f43f5e">AS</text>
                <text x="168" y="140" fill="#38bdf8">revenue</text>

                <text x="16" y="165" fill="#f43f5e">FROM</text>
                <text x="52" y="165" fill="#e2e8f0">orders</text>

                <text x="16" y="190" fill="#f43f5e">GROUP BY</text>
                <text x="80" y="190" fill="#f59e0b">1</text>

                <text x="0" y="215" fill="#e2e8f0">)</text>

                <text x="0" y="245" fill="#f43f5e">SELECT</text>
                <text x="52" y="245" fill="#38bdf8">mo</text>
                <text x="68" y="245" fill="#e2e8f0">,</text>
                <text x="76" y="245" fill="#38bdf8">revenue</text>
                <text x="130" y="245" fill="#e2e8f0">,</text>

                <text x="16" y="270" fill="#38bdf8">LAG</text>
                <text x="40" y="270" fill="#e2e8f0">(</text>
                <text x="46" y="270" fill="#38bdf8">revenue</text>
                <text x="100" y="270" fill="#e2e8f0">)</text>
                <text x="110" y="270" fill="#f43f5e">OVER</text>
                <text x="146" y="270" fill="#e2e8f0">(</text>
                <text x="152" y="270" fill="#f43f5e">ORDER BY</text>
                <text x="214" y="270" fill="#38bdf8">mo</text>
                <text x="230" y="270" fill="#e2e8f0">)</text>

                <text x="16" y="295" fill="#f43f5e">AS</text>
                <text x="35" y="295" fill="#38bdf8">prev_revenue</text>

                <text x="0" y="320" fill="#f43f5e">FROM</text>
                <text x="35" y="320" fill="#38bdf8">monthly_sales</text>
                <text x="122" y="320" fill="#e2e8f0">;</text>
            </g>
        </g>
    </g>

    <!-- Visual Element 2: Database Schema Diagram -->
    <g transform="translate(430, 110)" filter="url(#shadow)">
        <!-- Schema Container -->
        <rect width="330" height="340" rx="12" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
        
        <!-- Table 1: orders -->
        <g transform="translate(25, 30)">
            <rect width="130" height="110" rx="6" fill="#131926" stroke="#10b981" stroke-width="1" />
            <rect width="130" height="25" rx="5" fill="#0b0f19" />
            <text x="10" y="17" fill="#10b981" font-family="'Inter', sans-serif" font-size="11" font-weight="700">orders</text>
            <text x="10" y="45" fill="#94a3b8" font-family="monospace" font-size="10">🔑 order_id (INT)</text>
            <text x="10" y="65" fill="#94a3b8" font-family="monospace" font-size="10">🔗 customer_id</text>
            <text x="10" y="85" fill="#94a3b8" font-family="monospace" font-size="10">📅 order_date</text>
        </g>

        <!-- Table 2: order_items -->
        <g transform="translate(175, 120)">
            <rect width="130" height="130" rx="6" fill="#131926" stroke="#3b82f6" stroke-width="1" />
            <rect width="130" height="25" rx="5" fill="#0b0f19" />
            <text x="10" y="17" fill="#3b82f6" font-family="'Inter', sans-serif" font-size="11" font-weight="700">order_items</text>
            <text x="10" y="45" fill="#94a3b8" font-family="monospace" font-size="10">🔑 item_id (INT)</text>
            <text x="10" y="65" fill="#94a3b8" font-family="monospace" font-size="10">🔗 order_id</text>
            <text x="10" y="85" fill="#94a3b8" font-family="monospace" font-size="10">🔗 product_id</text>
            <text x="10" y="105" fill="#94a3b8" font-family="monospace" font-size="10">🔢 quantity</text>
        </g>

        <!-- Table 3: products -->
        <g transform="translate(25, 200)">
            <rect width="130" height="110" rx="6" fill="#131926" stroke="#3b82f6" stroke-width="1" />
            <rect width="130" height="25" rx="5" fill="#0b0f19" />
            <text x="10" y="17" fill="#3b82f6" font-family="'Inter', sans-serif" font-size="11" font-weight="700">products</text>
            <text x="10" y="45" fill="#94a3b8" font-family="monospace" font-size="10">🔑 product_id</text>
            <text x="10" y="65" fill="#94a3b8" font-family="monospace" font-size="10">📝 name</text>
            <text x="10" y="85" fill="#94a3b8" font-family="monospace" font-size="10">💵 price</text>
        </g>

        <!-- Relation Links (Linking Lines) -->
        <!-- Link orders to order_items -->
        <path d="M 155,75 L 240,75 L 240,120" fill="none" stroke="rgba(16, 185, 129, 0.4)" stroke-width="1.5" stroke-dasharray="3,3" />
        <!-- Link products to order_items -->
        <path d="M 155,245 L 240,245 L 240,250" fill="none" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1.5" stroke-dasharray="3,3" />
    </g>
</svg>
